name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@v6
      - name: 🚀 Run yamllint
        run: yamllint .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@v6
      - name: 🚀 Run ansible-lint
        uses: ansible/ansible-lint@v26
        with:
          requirements_file: requirements.yml
