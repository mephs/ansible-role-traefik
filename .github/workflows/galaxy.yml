name: Publish to Ansible Galaxy

on:
  release:
    types: [published]

jobs:
  galaxy:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@v6
      - name: 🚀 Publish to Ansible Galaxy
        uses: robertdebock/galaxy-action@1.2.1
        with:
          galaxy_api_key: ${{ secrets.ANSIBLE_GALAXY_TOKEN }}
